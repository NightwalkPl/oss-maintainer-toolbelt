name: Maintainer checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  maintainer-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install oss-maintainer-toolbelt
      - run: omt report . --json
      - run: omt template-lint .github/ISSUE_TEMPLATE
      - run: omt preflight .
